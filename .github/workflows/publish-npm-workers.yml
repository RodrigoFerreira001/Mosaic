name: Publish npm workers

on:
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs a recent npm CLI — the one bundled with
      # Node 20 predates OIDC support, so it's upgraded explicitly here.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish @catbit.dev/opfs-wasm-worker
        run: npm publish --access public
        working-directory: mosaic-client/opfsWorker

      - name: Publish @catbit.dev/sqlite-wasm-worker
        run: npm publish --access public
        working-directory: mosaic-client/sqliteWasmWorker
