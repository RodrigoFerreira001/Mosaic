name: Publish npm workers

on:
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @catbit.dev/opfs-wasm-worker
        run: npm publish --access public
        working-directory: mosaic-client/opfsWorker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @catbit.dev/sqlite-wasm-worker
        run: npm publish --access public
        working-directory: mosaic-client/sqliteWasmWorker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
